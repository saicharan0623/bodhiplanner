version: "3.8"

services:
  bodhiplanner:
    build: .
    container_name: bodhiplanner
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/bodhiplanner/auth/me"]
      interval: 30s
      timeout: 5s
      retries: 3
