# Apache2 reverse proxy config for Bodhi Planner
# Add this INSIDE your existing moodle.braou.ac.in VirtualHost block
# File: /etc/apache2/sites-available/moodle.braou.ac.in.conf (or similar)
#
# Prerequisites:
#   sudo a2enmod proxy proxy_http proxy_wstunnel rewrite
#   sudo systemctl restart apache2

# ─── Bodhi Planner reverse proxy ──────────────────────────────────────────────
# Place this block inside your <VirtualHost *:443> or <VirtualHost *:80> section

    # Proxy /bodhiplanner to the Docker container on port 3001
    ProxyPreserveHost On
    ProxyPass /bodhiplanner http://127.0.0.1:3001/bodhiplanner
    ProxyPassReverse /bodhiplanner http://127.0.0.1:3001/bodhiplanner

    # Ensure cookies work through the proxy
    <Location /bodhiplanner>
        ProxyPassReverseCookiePath /bodhiplanner /bodhiplanner
        RequestHeader set X-Forwarded-Proto "https"
        RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
    </Location>
